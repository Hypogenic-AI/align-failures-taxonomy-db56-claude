idea:
  title: Taxonomizing Alignment Failures in AI-driven Research
  domain: artificial_intelligence
  hypothesis: "Developing a taxonomy of alignment failures specific to AI-driven research\
    \ will reveal categories of failure\u2014such as omitting negative findings, overclaiming\
    \ results, and intentional research sabotage\u2014that are not yet well documented\
    \ in the literature.\n"
  background:
    description: 'AI-driven research is becoming increasingly common. It would be
      great to come up with a taxonomy of alignment failures in this context, examples
      could be omitting negative findings, overclaiming results, intentionally giving
      bad ideas (or generally research sabotage). Ideally, this taxonomy includes
      categories that are not yet well documented in the literature.

      '
